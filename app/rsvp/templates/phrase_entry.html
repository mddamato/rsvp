{% extends "base.html" %}
{% block content %}
<p class="lede">Enter the three-word passcode from your invitation card.</p>
{% if error %}<p class="notice">{{ error }}</p>{% endif %}
<form method="post" action="/">
  <input type="text" name="honeypot" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true">
  <label for="phrase">Passcode</label>
  <input type="text" id="phrase" name="phrase" placeholder="apple-sky-boat"
         autocapitalize="none" autocomplete="off" spellcheck="false" required>
  <button type="submit" data-once>Find my invitation</button>
</form>
<p class="fine-print">Lost your card? <a href="/recover">Recover your link by email</a>.</p>
{% endblock %}
